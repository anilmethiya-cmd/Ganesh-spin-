
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Ganesh Lucky Spin</title>
<style>
body{
  margin:0;
  padding:20px;
  text-align:center;
  font-family:Arial,sans-serif;
  background:#f8f1dd;
}
h1{
  font-size:32px;
  margin-top:20px;
}
p{
  font-size:22px;
  margin:20px 0;
}
.pointer{
  width:0;
  height:0;
  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-top:40px solid red;
  margin:10px auto -5px;
  z-index:10;
  position:relative;
}
.wheel-box{
  position:relative;
  width:320px;
  height:320px;
  margin:0 auto;
}
#wheel{
  width:320px;
  height:320px;
  border-radius:50%;
  border:10px solid #333;
  transition:transform 4s ease-out;
}
button{
  margin-top:25px;
  padding:18px 55px;
  font-size:28px;
  border:none;
  border-radius:15px;
  background:red;
  color:#fff;
}
#result{
  margin-top:25px;
  font-size:34px;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>श्री गणेश रेडीमेड लकी स्पिन</h1>
<p>₹2500+ की खरीदारी करें और स्पिन करके जीतें!</p>

<div class="pointer"></div>

<div class="wheel-box">
<canvas id="wheel" width="320" height="320"></canvas>
</div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
const prizes = [
"5% Discount",
"10% Discount",
"15% Discount",
"20% Discount",
"Gift Free",
"Better Luck"
];

const colors = [
"#ff4d4d",
"#ffd11a",
"#66ff5c",
"#4d9be6",
"#e65cc2",
"#fa924a"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");
const center = 160;
const radius = 150;

function drawWheel(){
  const slice = (2*Math.PI)/prizes.length;

  for(let i=0;i<prizes.length;i++){
    ctx.beginPath();
    ctx.moveTo(center,center);
    ctx.arc(center,center,radius,i*slice,(i+1)*slice);
    ctx.fillStyle = colors[i];
    ctx.fill();

    ctx.save();
    ctx.translate(center,center);
    ctx.rotate(i*slice + slice/2);
    ctx.fillStyle="black";
    ctx.font="bold 18px Arial";
    ctx.textAlign="right";
    ctx.fillText(prizes[i],130,8);
    ctx.restore();
  }
}
drawWheel();

let angle = 0;

function spin(){
  const random = Math.floor(Math.random()*prizes.length);
  const slice = 360/prizes.length;
  angle += 1800 + (360 - random*slice - slice/2);

  document.getElementById("wheel").style.transform =
  `rotate(${angle}deg)`;

  setTimeout(()=>{
    document.getElementById("result").innerHTML =
    "🎉 " + prizes[random];
  },4000);
}
</script>

</body>
</html>
