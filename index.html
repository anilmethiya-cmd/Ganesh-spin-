<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shri Ganesh Readymade Lucky Spin</title>
<style>
body{font-family:Arial;text-align:center;background:#fff8e7;padding:20px}
button{padding:15px 25px;font-size:22px;background:#e63946;color:white;border:none;border-radius:10px}
#result{font-size:30px;margin-top:25px;font-weight:bold;color:#222}
</style>
</head>
<body>
<h1>श्री गणेश रेडीमेड लकी स्पिन</h1>
<p>₹2500+ की खरीदारी करें और स्पिन करके जीतें!</p>
<button onclick="spin()">SPIN</button>
<div id="result"></div>

<script>
let used=false;
let prizes=[
"5% Off",
"Socks Free",
"Better Luck Next Time",
"Mystery Gift",
"₹50 Off",
"5% Off Next Visit"
];

function spin(){
 if(used){
   alert("इस स्कैन पर 1 स्पिन हो चुका है");
   return;
 }
 used=true;
 let prize=prizes[Math.floor(Math.random()*prizes.length)];
 document.getElementById("result").innerHTML="🎉 "+prize;
}
</script>
</body>
</html>
