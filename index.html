<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Ganesh Lucky Spin</title>
<style>
body{
  margin:0;
  padding:20px;
  text-align:center;
  font-family:Arial,sans-serif;
  background:#f8f1dd;
}
h1{font-size:34px;}
p{font-size:22px;}
.pointer{
  width:0;height:0;
  border-left:22px solid transparent;
  border-right:22px solid transparent;
  border-top:40px solid red;
  margin:10px auto;
}
canvas{
  background:#fff8ea;
  border-radius:50%;
  border:12px solid #333;
}
button{
  margin-top:25px;
  padding:18px 55px;
  font-size:28px;
  border:none;
  border-radius:15px;
  background:red;
  color:white;
}
#result{
  margin-top:25px;
  font-size:34px;
  font-weight:bold;
}
</style>
</head>
<body>

<h1>श्री गणेश रेडीमेड लकी स्पिन</h1>
<p>₹2500+ की खरीदारी करें और स्पिन करके जीतें!</p>

<div class="pointer"></div>
<canvas id="wheel" width="320" height="320"></canvas><br>
<button onclick="spin()">SPIN</button>
<div id="result"></div>

<script>
const prizes = [
"Better Luck Next Time",
"Socks Free",
"Mystery Box",
"₹50 Off",
"5% Off",
"5% Off Next Visit"
];

// weight
const weighted = [
0,0,0,0,0,0,0,   // Better Luck 35%
1,1,1,1,         // Socks 20%
2,2,             // Mystery 10%
3,3,3,           // ₹50 Off 15%
4,4,             // 5% Off 10%
5,5              // Next Visit 10%
];

const colors=["#ff5757","#ffd93d","#63ff63","#5ca9ff","#e86cff","#ff9a4d"];

const canvas=document.getElementById("wheel");
const ctx=canvas.getContext("2d");
const center=160;
const radius=150;
const slice=(2*Math.PI)/6;

function draw(){
for(let i=0;i<6;i++){
ctx.beginPath();
ctx.moveTo(center,center);
ctx.arc(center,center,radius,i*slice,(i+1)*slice);
ctx.fillStyle=colors[i];
ctx.fill();

ctx.save();
ctx.translate(center,center);
ctx.rotate(i*slice+slice/2);
ctx.fillStyle="#000";
ctx.font="bold 15px Arial";
ctx.textAlign="right";
ctx.fillText(prizes[i],130,5);
ctx.restore();
}
}
draw();

let current=0;

function spin(){
let pick = weighted[Math.floor(Math.random()*weighted.length)];
let target = 360 - (pick*60 + 30);
current += 1800 + target;

document.getElementById("wheel").style.transition="transform 4s ease-out";
document.getElementById("wheel").style.transform=`rotate(${current}deg)`;

setTimeout(()=>{
document.getElementById("result").innerHTML="🎉 "+prizes[pick];
},4000);
}
</script>

</body>
</html>
