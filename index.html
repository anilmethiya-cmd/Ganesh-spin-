<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shri Ganesh Readymade Lucky Spin</title>

<style>
body{
  margin:0;
  padding:20px;
  text-align:center;
  font-family:Arial;
  background:#f8f1dd;
}

h1{
  font-size:32px;
  margin-top:25px;
}

p{
  font-size:22px;
}

#wheel{
  width:280px;
  height:280px;
  border-radius:50%;
  margin:30px auto;
  border:10px solid #333;
  background:conic-gradient(
    #ff4d4d 0deg 60deg,
    #ffd11a 60deg 120deg,
    #66ff66 120deg 180deg,
    #4da6ff 180deg 240deg,
    #ff66cc 240deg 300deg,
    #ff944d 300deg 360deg
  );
  transition: all 4s ease-out;
}

button{
  background:red;
  color:white;
  border:none;
  border-radius:12px;
  padding:18px 40px;
  font-size:28px;
}

#result{
  margin-top:25px;
  font-size:34px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>श्री गणेश रेडीमेड लकी स्पिन</h1>
<p>₹2500+ की खरीदारी करें और स्पिन करके जीतें!</p>

<div id="wheel"></div>

<button onclick="spin()">SPIN</button>

<div id="result"></div>

<script>
let done = false;
let currentDeg = 0;

function spin(){
  if(done){
    alert("एक बार spin हो चुका है");
    return;
  }

  done = true;

  let prizes = [
    "🎁 5% Discount",
    "🎉 10% Discount",
    "🥳 Gift Free",
    "💥 Better Luck Next Time",
    "🎊 15% Discount",
    "🎁 Surprise Gift"
  ];

  let num = Math.floor(Math.random()*prizes.length);

  currentDeg += 2160 + (num*60);

  document.getElementById("wheel").style.transform =
    "rotate(" + currentDeg + "deg)";

  setTimeout(function(){
    document.getElementById("result").innerHTML = prizes[num];
  }, 4000);
}
</script>

</body>
</html>
